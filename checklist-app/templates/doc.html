<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ doc_title }} | Learning Path Docs</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --accent: #0369a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
      }

      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        color: var(--accent);
        font-weight: 700;
      }

      .filename {
        color: var(--muted);
        font-size: 14px;
      }

      .doc {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 28px;
      }

      .doc h1,
      .doc h2,
      .doc h3,
      .doc h4 {
        line-height: 1.35;
        margin: 1.5em 0 0.5em;
      }

      .doc h1 {
        margin-top: 0;
      }

      .doc p,
      .doc ul,
      .doc ol,
      .doc blockquote {
        margin: 0.75em 0;
      }

      .doc code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 0.12em 0.35em;
      }

      .doc pre {
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 12px 14px;
        overflow-x: auto;
      }

      .doc pre code {
        background: transparent;
        border: 0;
        color: inherit;
        padding: 0;
      }

      .doc table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
      }

      .doc th,
      .doc td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
      }

      @media (max-width: 640px) {
        .doc {
          padding: 18px 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="toolbar">
        <a class="back-link" href="/">← Back to Checklist</a>
        <span class="filename">{{ doc_filename }}</span>
      </div>
      <article class="doc">{{ rendered_doc }}</article>
    </main>
  </body>
</html>
